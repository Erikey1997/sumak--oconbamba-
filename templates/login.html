<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMAK' OCONBAMBA - Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;
             background:#1B4332;
             display:flex;align-items:center;
             justify-content:center;min-height:100vh}
        .login-box{
            background:#fff;border-radius:12px;
            padding:40px;width:100%;max-width:380px;
            box-shadow:0 10px 30px rgba(0,0,0,.3)
        }
        .login-box .logo{text-align:center;margin-bottom:30px}
        .login-box .logo .icono{font-size:50px}
        .login-box .logo h1{color:#1B4332;font-size:22px;margin-top:8px}
        .login-box .logo p{color:#777;font-size:12px}
        .form-group{margin-bottom:18px}
        .form-group label{
            display:block;font-size:13px;
            color:#555;margin-bottom:6px;font-weight:600
        }
        .form-group input{
            width:100%;padding:11px 14px;
            border:1px solid #ddd;border-radius:6px;
            font-size:14px;transition:0.2s
        }
        .form-group input:focus{
            outline:none;border-color:#52B788
        }
        .btn-login{
            width:100%;padding:12px;
            background:#1B4332;color:#fff;
            border:none;border-radius:6px;
            font-size:15px;font-weight:bold;
            cursor:pointer;transition:0.2s
        }
        .btn-login:hover{background:#2D6A4F}
        .error{
            background:#FFE0E0;color:#C62828;
            padding:10px;border-radius:5px;
            margin-bottom:15px;font-size:13px
        }
        .version{
            text-align:center;margin-top:15px;
            font-size:11px;color:#aaa
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <div class="icono">🌿</div>
        <h1>SUMAK' OCONBAMBA</h1>
        <p>Sistema de Control de Ventas</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="error">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>👤 Usuario</label>
            <input type="text" name="usuario"
                   placeholder="Ingresa tu usuario"
                   required autofocus>
        </div>
        <div class="form-group">
            <label>🔑 Contraseña</label>
            <input type="password" name="password"
                   placeholder="Ingresa tu contraseña"
                   required>
        </div>
        <button type="submit" class="btn-login">
            🚀 INGRESAR AL SISTEMA
        </button>
    </form>
    <p class="version">v2.0 | Sistema en la nube | Gratis</p>
</div>
</body>
</html>
